name: .NET

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, ubuntu-24.04-arm, windows-11-arm, macos-26-intel]

    steps:
      - uses: actions/checkout@v6
      - name: Setup
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            3.1.x
            6.0.x
            7.0.x
            8.0.x
            10.0.x
    
      - name: Restore
        run: dotnet restore IT.Text.Json.sln
    
      - name: Build
        run: dotnet build IT.Text.Json.sln --configuration Release --no-restore 
    
      - name: Test
        run: dotnet test IT.Text.Json.Tests/IT.Text.Json.Tests.csproj --configuration Release --no-restore

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Publish IT.Text.Json
        uses: pairbit/publish-nuget@v2.6.2
        with:
            PROJECT_FILE_PATH: IT.Text.Json/IT.Text.Json.csproj
            NUGET_KEY: ${{secrets.NUGET}}
            TAG_COMMIT: true
